<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="stylesheet" href="ccstyle.css">

     
     <title>Chocolate Clicker</title>
</head>
<body>
     <h1>Chocolate Clicker</h1>
     <p>A game by Old Awesome</p>
     <p>Click the Chocolate Bar to get chocolate</p>
     <img id="chocolatebarimage" src="chocolatebar.png">
     <br>
     <h2>Chocolate Count: <span id="chocolate-count-display">0</span></h2>
     <h3>Chocolate Per Second: <span id="chocolate-per-second-display">0</span></h3>
     <br>
     
     <div id="chocolate-elves">
          <h2 id="chocolate-elves-title">Chocolate Elves</h2>
          <h2 id="chocolate-elves-cost-text">Cost: <span id="chocolate-elf-cost">30</span> Chocolate</p>
          <h2 id="chocolate-elves-count">Owned: <span id="chocolate-elves-count-value">0</span></h2>
     </div>

     <div id="chocolate-dwarves">
          <h2 id="dwarves-title">Chocolate Dwarves</h2>
          <h2 id="dwarves-cost-text">Cost: <span id="dwarves-cost">200</span> Chocolate</h2>
          <h2 id="dwarves-count">Owned: <span id="dwarves-count-value">0</span></h2>
     </div>

     <script src="ccscripts.js"></script>
</body>
</html>
