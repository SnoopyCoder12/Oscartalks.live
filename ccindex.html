<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="stylesheet" href="ccstyle.css">

     
     <title>Chocolate Clicker</title>
</head>
<body>
     <h1>Chocolate Clicker</h1>
     <p>A game by Old Awesome</p>
     <p>Click the Chocolate Bar to get chocolate</p>

     <div id="left-section">
          <h2 id="total-chocolate">Chocolate Count: <span id="chocolate-count">0</span></h2>
          <h3>Chocolate Per Second: <span id="chocolate-per-second-display">0</span></h3>
          <br>
          <img id="chocolatebarimage" src="chocolatebar.png">
          <br>
          <h2>Version 1.0.0</h2>
     </div>

     <div id="right-section">
          <div id="chocolate-elves">
               <h2 id="chocolate-elves-title">Chocolate Elves</h2>
               <h2 id="chocolate-elves-cost-text">Cost: <span id="chocolate-elf-cost">15</span></h2>
               <h2 id="chocolate-elves-count"><span id="chocolate-elves-count-value">0</span></h2>
          </div>

          <div id="chocolate-dwarves">
               <h2 id="dwarves-title">Chocolate Dwarves</h2>
               <h2 id="dwarves-cost-text">Cost: <span id="dwarves-cost">100</span></h2>
               <h2 id="dwarves-count"><span id="dwarves-count-value">0</span></h2>
          </div>

          <div id="chocolate-orges">
               <h2 id="orges-title">Chocolate Orges</h2>
               <h2 id="orges-cost-text">Cost: <span id="orges-cost">1100</span></h2>
               <h2 id="orges-count"><span id="orges-count-value">0</span></h2>
          </div>
          <br>
     </div>
     <script src="ccscripts.js"></script>
</body>
</html>
